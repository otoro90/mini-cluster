apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress-traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: app-strip-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /keycloak
        pathType: Prefix
        backend:
          service:
            name: keycloak-svc
            port:
              number: 8080
      - path: /postgres
        pathType: Prefix
        backend:
          service:
            name: postgres-svc
            port:
              number: 5432
---
# Middleware para quitar prefijo
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: app-strip-prefix
spec:
  stripPrefix:
    prefixes:
      - /keycloak
      - /postgres
---
# Ingress alternativo para acceso directo por IP
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: direct-access-ingress-traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: keycloak-svc
            port:
              number: 8080