---
# Docker Registry v2 — ARM64-native (registry:2 official multi-arch image)
# Registro de contenedores local para Forjanova Labs cluster.
# URL: http://registry.192.168.1.210.nip.io (solo LAN — no expuesto a internet)
#
# SETUP INICIAL (una sola vez antes de kubectl apply):
#
#   kubectl create namespace registry
#
#   # Generar htpasswd (bcrypt) — requiere apache2-utils o httpd-tools
#   htpasswd -nbB admin Registry12345 > /tmp/registry-htpasswd
#
#   kubectl create secret generic registry-auth \
#     --from-file=htpasswd=/tmp/registry-htpasswd \
#     -n registry
#
#   rm /tmp/registry-htpasswd
#
#   # Luego aplicar este manifest:
#   kubectl apply -f manifests/registry/registry.yaml
#
# ACCESO desde LAN:
#   docker login registry.192.168.1.210.nip.io -u admin -p Registry12345
#   docker push registry.192.168.1.210.nip.io/myimage:tag
#
# NOTA: El registro principal de CI/CD es ghcr.io (alcanzable desde GitHub Actions).
# Este registry local es para uso directo en LAN o como cache off-line.
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-data
  namespace: registry
spec:
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: registry
  labels:
    app: registry
    app.kubernetes.io/name: registry
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      # Pinned a maestro: tiene el PVC local-path y SSD de 1TB
      nodeSelector:
        kubernetes.io/hostname: orangepi6plus
      containers:
        - name: registry
          # registry:2 es official Docker multi-arch: soporta linux/arm64
          image: registry:2
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: REGISTRY_AUTH
              value: htpasswd
            - name: REGISTRY_AUTH_HTPASSWD_REALM
              value: "Forjanova Registry"
            - name: REGISTRY_AUTH_HTPASSWD_PATH
              value: /auth/htpasswd
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
            - name: REGISTRY_HTTP_ADDR
              value: "0.0.0.0:5000"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            # tcpSocket porque /v2/ devuelve 401 cuando htpasswd está activo
            # (httpGet con código 4xx se trata como fallo de probe)
            tcpSocket:
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
            - name: auth
              mountPath: /auth
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-data
        - name: auth
          secret:
            secretName: registry-auth
            items:
              - key: htpasswd
                path: htpasswd
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: registry
spec:
  selector:
    app: registry
  ports:
    - port: 5000
      targetPort: 5000
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: registry
  namespace: registry
  annotations:
    # Necesario para Docker push (imágenes pueden ser multi-GB)
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  rules:
    - host: registry.192.168.1.210.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: registry
                port:
                  number: 5000
