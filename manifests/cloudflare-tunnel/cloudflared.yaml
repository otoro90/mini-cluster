apiVersion: v1
kind: Namespace
metadata:
  name: cloudflare-tunnel
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-tunnel-token
  namespace: cloudflare-tunnel
type: Opaque
stringData:
  # Paste the token from Cloudflare Zero Trust > Networks > Tunnels
  token: "REPLACE_WITH_TUNNEL_TOKEN"
---
# =============================================================================
# Rutas del tunnel — configurar en Cloudflare Zero Trust Dashboard
# Ruta: Zero Trust > Networks > Tunnels > <tu-tunnel> > Configure > Public Hostnames
#
# Servicio          | Hostname público               | Internal URL
# ------------------|-------------------------------|----------------------------------
# ZITADEL (IdP)     | auth.forjanova.com            | http://192.168.1.210:80
# Headscale (VPN)   | vpn.forjanova.com             | http://192.168.1.210:80
# Argo CD           | argocd.<tu-dominio.com>       | http://192.168.1.210:80
# Tramites (prod)   | tramites.<tu-dominio.com>     | http://192.168.1.210:80
#
# IMPORTANTE — Host Headers:
# Traefik usa name-based routing. El tunnel debe enviar el hostname correcto.
# En Zero Trust: Additional application settings > HTTP Settings > HTTP Host Header
#   auth:      auth.forjanova.com
#   vpn:       vpn.forjanova.com
#   argocd:    argocd.local
#   tramites:  tramites.forjanova.local
#
# ZITADEL necesita conocer su URL pública HTTPS para OIDC. Tras activar el tunnel:
#   ./scripts/update-zitadel-domain.sh https://zitadel.<tu-dominio.com>
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-info
  namespace: cloudflare-tunnel
data:
  README: |
    Configure public hostnames in Cloudflare Zero Trust Dashboard.
    After activating: run scripts/update-zitadel-domain.sh with the HTTPS domain.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflare-tunnel
  labels:
    app.kubernetes.io/name: cloudflared
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflared
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: orangepi6plus
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:2026.3.0
          imagePullPolicy: IfNotPresent
          args:
            - tunnel
            - --no-autoupdate
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflared-tunnel-token
                  key: token
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
              ephemeral-storage: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
              ephemeral-storage: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: ["ALL"]
      securityContext:
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cloudflared
  namespace: cloudflare-tunnel
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
